name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add droplet to known hosts
        run: ssh-keyscan -T 10 -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env.production to droplet
        run: |
          ssh root@${{ secrets.DO_HOST }} "cat > /var/www/linigo-be/.env.production << 'ENVEOF'
          ${{ secrets.APP_ENV }}
          ENVEOF"

      - name: Deploy via SSH
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=30 root@${{ secrets.DO_HOST }} bash << 'EOF'
            set -e
            cd /var/www/linigo-be
            git pull origin main
            docker compose up --build -d
            docker image prune -f
          EOF
